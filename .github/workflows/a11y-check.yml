name: Accessibility Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "**/*.html"
      - "**/*.css"

permissions:
  contents: read

jobs:
  html-validate:
    name: HTML Validate (static a11y lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run html-validate
        run: npx html-validate@10.11.1 youtube_to_docs/static/index.html

  axe-scan:
    name: axe-core WCAG 2.1 AA Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install matching ChromeDriver
        run: npx browser-driver-manager install chrome

      - name: Serve static files and run axe-core
        run: |
          python3 -m http.server 8080 \
            --directory youtube_to_docs/static &
          SERVER_PID=$!
          # Wait for server to be ready
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/index.html > /dev/null && break
            sleep 1
          done
          npx @axe-core/cli@4.11.1 \
            --exit \
            --tags wcag2a,wcag2aa \
            http://localhost:8080/index.html
          kill $SERVER_PID

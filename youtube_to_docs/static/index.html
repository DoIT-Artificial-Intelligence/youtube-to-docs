<link rel="stylesheet" href="https://cdn.maryland.gov/mdwds/latest/css/mdwds.min.css" />
<style>
  /* CSS custom properties for theming and maintainability */
  :root {
    --header-bg: #1a1a2e;
    --header-text: #fff;
    --header-muted: #b0b0c8;
    --header-border: #3a3a5c;
    --header-border-hover: #8888aa;
    --link-color: #0050d8;
    --link-hover: #1a4480;
    --dark-bg: #1b1b1b;
    --border-color: #dfe1e2;
    --muted-text: #71767a;
    --log-text: #a3e635;
    --status-active: #e5a000;
    --status-success: #00a91c;
    --status-error: #b50909;
    --artifact-bg: #f0f0f0;
  }

  /* Custom styles for app-specific elements not covered by MDWDS */
  .app-header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 1.5rem 0;
  }

  .app-header h1 {
    margin: 0;
    font-size: 1.75rem;
    color: var(--header-text);
  }

  .app-header .subtitle {
    color: var(--header-muted);
    font-size: 0.95rem;
    margin-top: 0.25rem;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding-top: 0.25rem;
  }

  .github-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--header-muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--header-border);
    border-radius: 6px;
    transition: color 0.2s, border-color 0.2s;
  }

  .github-badge:hover {
    color: var(--header-text);
    border-color: var(--header-border-hover);
  }

  .toggle-link {
    color: var(--link-color);
    cursor: pointer;
    font-size: 0.9rem;
    text-decoration: underline;
    display: inline-block;
    margin-bottom: 1rem;
    background: none;
    border: none;
    padding: 0;
  }

  .toggle-link:hover {
    color: var(--link-hover);
  }

  .advanced { display: none; }
  .advanced.show { display: block; }

  .card-body {
    padding: 1.5rem;
  }

  .logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 1rem;
  }

  .logo-container img {
    flex-shrink: 0;
    border-radius: 4px;
    height: 210px;
    width: auto;
    max-height: 210px;
  }

  .usa-form--full-width {
    max-width: none;
  }

  .label--nowrap {
    white-space: nowrap;
  }

  #log-area {
    background: var(--dark-bg);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 1rem;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 0.8rem;
    line-height: 1.5;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--log-text);
    display: none;
  }

  .status-bar {
    display: none;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    font-size: 0.85rem;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--status-active);
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }

  .status-dot.done { background: var(--status-success); animation: none; }
  .status-dot.error { background: var(--status-error); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .artifacts-list {
    display: grid;
    gap: 0.5rem;
  }

  .artifact-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    background: var(--artifact-bg);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    font-size: 0.85rem;
    min-width: 0;
  }

  .artifact-info {
    min-width: 0;
  }

  .artifact-item .dir {
    display: inline-block;
    color: var(--link-color);
    background: rgba(0, 80, 216, 0.08);
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-bottom: 0.25rem;
  }

  .artifact-item .name {
    display: block;
    color: var(--dark-bg);
    font-family: monospace;
    font-size: 0.8rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .artifact-item a {
    color: var(--link-color);
    text-decoration: none;
    font-size: 0.8rem;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .artifact-item a:hover { text-decoration: underline; }

  #artifacts-card { display: none; }

  .usa-fieldset {
    border: none;
    padding: 0;
    margin: 0;
  }

  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid var(--muted-text);
    background: none;
    color: var(--muted-text);
    font-size: 0.7rem;
    font-weight: 700;
    font-style: italic;
    font-family: Georgia, serif;
    cursor: pointer;
    vertical-align: middle;
    margin-left: 0.25rem;
    padding: 0;
    line-height: 1;
  }

  .info-btn:hover {
    background: var(--link-color);
    border-color: var(--link-color);
    color: var(--header-text);
  }

  .info-tooltip {
    display: none;
    background: var(--dark-bg);
    color: var(--header-text);
    font-size: 0.8rem;
    font-weight: 400;
    font-style: normal;
    text-transform: none;
    letter-spacing: normal;
    line-height: 1.5;
    padding: 0.75rem 1rem;
    border-radius: 4px;
    margin-top: 0.5rem;
    max-width: 500px;
  }

  .info-tooltip.show {
    display: block;
  }

  .artifacts-heading {
    font-size: 1.1rem;
    color: var(--muted-text);
    font-weight: 500;
    margin-bottom: 1rem;
  }
</style>
</head>

<main id="main-content">
  <div class="grid-container padding-top-4 padding-bottom-4">

    <!-- Configuration Card -->
    <div class="maryland-card maryland-card--simple margin-bottom-3">
      <div class="maryland-card__container card-body">
        <div class="logo-container">
          <img src="/static/logo.png" alt="YouTube to Docs logo">
        </div>

        <form class="usa-form usa-form--full-width">
          <!-- YouTube URL -->
          <label class="usa-label label--nowrap" for="url">YouTube URL, Video ID, Playlist ID, Channel Handle, or comma-separated Video IDs</label>
          <input class="usa-input" id="url" name="url" type="text" placeholder="URL, video ID, PL..., @channel, or ID1,ID2,ID3">

          <!-- Output File -->
          <div class="grid-row grid-gap margin-top-2">
            <div class="grid-col-12 tablet:grid-col-6">
              <label class="usa-label" for="output_file">Output File</label>
              <select class="usa-select" id="output_file" name="output_file">
                <option value="youtube-to-docs-artifacts/youtube-docs.csv">Local CSV (default)</option>
                <option value="workspace">Google Drive (Workspace)</option>
                <option value="sharepoint">Microsoft SharePoint</option>
                <option value="none">None (log only)</option>
              </select>
            </div>
          </div>

          <!-- Toggle advanced options -->
          <div class="margin-top-2">
            <button type="button" class="toggle-link" onclick="toggleAdvanced()">Show advanced options</button>
          </div>

          <!-- Advanced Options -->
          <div class="advanced" id="advanced-section">
            <div class="grid-row grid-gap">
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="all_suite">Model Suite <button type="button" class="info-btn" onclick="this.nextElementSibling.classList.toggle('show')" aria-label="More info about Model Suite">i</button>
                  <div class="info-tooltip">Shortcut to use a specific model suite for everything.<br><br><strong>gemini-flash:</strong> summarization (gemini-3-flash-preview), TTS (gemini-2.5-flash-preview-tts-Kore), infographic (gemini-3.1-flash-image-preview).<br><strong>gemini-pro:</strong> summarization (gemini-3.1-pro-preview), TTS (gemini-2.5-pro-preview-tts-Kore), infographic (gemini-3-pro-image-preview).<br><strong>gemini-flash-pro-image:</strong> summarization (gemini-3-flash-preview), TTS (gemini-2.5-flash-preview-tts-Kore), infographic (gemini-3-pro-image-preview).<br><strong>gcp-pro:</strong> summarization (gemini-3.1-pro-preview), TTS (gcp-chirp3), infographic (gemini-3-pro-image-preview).<br><br>Also sets "Skip YouTube summary".</div>
                </label>
                <select class="usa-select" id="all_suite" name="all_suite">
                  <option value="">None (transcript only)</option>
                </select>
              </div>
            </div>
            <div class="grid-row grid-gap margin-top-2">
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="model">Summary Model</label>
                <input class="usa-input" id="model" name="model" type="text" list="model-options" placeholder="e.g. gemini-3-flash-preview">
                <datalist id="model-options"></datalist>
              </div>
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="transcript_source">Transcript Source</label>
                <input class="usa-input" id="transcript_source" name="transcript_source" type="text" value="youtube" placeholder="youtube or AI model name">
              </div>
            </div>

            <div class="grid-row grid-gap margin-top-2">
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="tts_model">Text-To-Speech Model</label>
                <input class="usa-input" id="tts_model" name="tts_model" type="text" list="tts-options" placeholder="e.g. gemini-2.5-flash-preview-tts-Kore">
                <datalist id="tts-options"></datalist>
              </div>
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="infographic_model">Infographic Model</label>
                <input class="usa-input" id="infographic_model" name="infographic_model" type="text" list="infographic-options" placeholder="e.g. gemini-3.1-flash-image-preview">
                <datalist id="infographic-options"></datalist>
              </div>
            </div>

            <div class="grid-row grid-gap margin-top-2">
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="alt_text_model">Alt Text Model</label>
                <input class="usa-input" id="alt_text_model" name="alt_text_model" type="text" list="model-options" placeholder="Defaults to summary model">
              </div>
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="translate">Translate</label>
                <input class="usa-input" id="translate" name="translate" type="text" list="translate-options" placeholder="e.g. gemini-3-flash-preview-spanish">
                <datalist id="translate-options"></datalist>
              </div>
            </div>

            <div class="grid-row grid-gap margin-top-2">
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="suggest_corrected_captions">Suggest Corrected Captions</label>
                <input class="usa-input" id="suggest_corrected_captions" name="suggest_corrected_captions" type="text" list="model-options" placeholder="e.g. gemini-3-flash-preview">
              </div>
              <div class="grid-col-12 tablet:grid-col-6">
                <label class="usa-label" for="post_process">Post Process (JSON)</label>
                <input class="usa-input" id="post_process" name="post_process" type="text" placeholder='e.g. {"word count": "apple"}'>
              </div>
            </div>

            <!-- Checkboxes -->
            <fieldset class="usa-fieldset margin-top-2">
              <div class="usa-checkbox">
                <input class="usa-checkbox__input" id="combine_infographic_audio" type="checkbox" name="combine_infographic_audio">
                <label class="usa-checkbox__label" for="combine_infographic_audio">Combine infographic + audio</label>
              </div>
              <div class="usa-checkbox">
                <input class="usa-checkbox__input" id="no_youtube_summary" type="checkbox" name="no_youtube_summary">
                <label class="usa-checkbox__label" for="no_youtube_summary">Skip YouTube summary</label>
              </div>
              <div class="usa-checkbox">
                <input class="usa-checkbox__input" id="verbose" type="checkbox" name="verbose" checked>
                <label class="usa-checkbox__label" for="verbose">Verbose output</label>
              </div>
            </fieldset>
          </div>
        </form>
      </div>
    </div>

    <!-- Process Button -->
    <button type="button" class="usa-button usa-button--big width-full" id="process-btn" onclick="startProcess()">Process Video</button>

    <!-- Log Output Card -->
    <div class="maryland-card maryland-card--simple margin-top-3">
      <div class="maryland-card__container card-body">
        <div class="status-bar" id="status-bar">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Processing...</span>
        </div>
        <div id="log-area"></div>
      </div>
    </div>

    <!-- Artifacts Card -->
    <div class="maryland-card maryland-card--simple margin-top-3" id="artifacts-card">
      <div class="maryland-card__container card-body">
        <h2 class="usa-heading artifacts-heading">Artifacts</h2>
        <div class="artifacts-list" id="artifacts-list"></div>
      </div>
    </div>

  </div>
</main>


<!-- Footer -->
<footer class="maryland-footer">
  <div class="maryland-footer__container">
    <section aria-labelledby="agency-footer" class="maryland-footer__section">
      <div class="maryland-footer__agency-menu">
        <div class="maryland-footer__agency-contact">
          <div class="maryland-footer__link-group">
            <h3 class="maryland-footer__link-group-heading">Resources</h3>
            <ul class="maryland-footer__link-group-list">
              <li><a href="https://doit-artificial-intelligence.github.io/youtube-to-docs/" target="_blank" rel="noopener noreferrer">Documentation</a></li>
              <li><a href="https://doit-artificial-intelligence.github.io/youtube-to-docs/how-this-works/" target="_blank" rel="noopener noreferrer">How This Works</a></li>
              <li><a href="https://github.com/DoIT-Artificial-Intelligence/youtube-to-docs" target="_blank" rel="noopener noreferrer">GitHub Repository</a></li>
              <li><a href="https://pypi.org/project/youtube-to-docs/" target="_blank" rel="noopener noreferrer">PyPI Package</a></li>
            </ul>
          </div>
        </div>
      </div>
    </section>
  </div>
</footer>

<script>
  const $ = id => document.getElementById(id);

  const SUMMARY_MODELS = [
    'bedrock-claude-haiku-4-5-20251001-v1',
    'bedrock-nova-2-lite-v1',
    'foundry-gpt-5-mini',
    'gemini-3-flash-preview',
    'gemini-3.1-pro-preview',
    'vertex-claude-haiku-4-5@20251001',
  ];

  // Load model suites and populate dropdowns
  fetch('/api/model-suites')
    .then(r => r.json())
    .then(suites => {
      const sel = $('all_suite');
      for (const [key, val] of Object.entries(suites)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = key + ' (' + val.model + ')';
        sel.appendChild(opt);
      }
    });

  const TRANSLATE_OPTIONS = [
    'aws-translate-spanish',
    'aws-translate-french',
    'aws-translate-korean',
    'aws-translate-chinese',
    'gcp-translate-spanish',
    'gcp-translate-french',
    'gcp-translate-korean',
    'gcp-translate-chinese',
    'gemini-3-flash-preview-spanish',
    'gemini-3-flash-preview-french',
    'gemini-3-flash-preview-korean',
    'gemini-3-flash-preview-chinese',
  ];

  const INFOGRAPHIC_MODELS = [
    'gemini-3-pro-image-preview',
    'gemini-3.1-flash-image-preview',
  ];

  const TTS_MODELS = [
    'aws-polly',
    'aws-polly-Ruth',
    'gcp-chirp3',
    'gcp-chirp3-Kore',
    'gemini-2.5-flash-preview-tts-Kore',
    'gemini-2.5-pro-preview-tts-Kore',
  ];

  // Populate datalists
  function populateDatalist(id, items) {
    const dl = $(id);
    for (const m of items) {
      const opt = document.createElement('option');
      opt.value = m;
      dl.appendChild(opt);
    }
  }
  populateDatalist('model-options', SUMMARY_MODELS);
  populateDatalist('infographic-options', INFOGRAPHIC_MODELS);
  populateDatalist('translate-options', TRANSLATE_OPTIONS);
  populateDatalist('tts-options', TTS_MODELS);

  function toggleAdvanced() {
    const sec = $('advanced-section');
    const link = sec.previousElementSibling.querySelector('.toggle-link');
    sec.classList.toggle('show');
    link.textContent = sec.classList.contains('show') ? 'Hide advanced options' : 'Show advanced options';
  }

  let currentJobId = null;
  let eventSource = null;

  function startProcess() {
    const url = $('url').value.trim();
    if (!url) { alert('Please enter a YouTube URL or Video ID.'); return; }

    // Build request body
    const body = { url };

    const fields = [
      'output_file', 'transcript_source', 'model', 'tts_model',
      'infographic_model', 'alt_text_model', 'translate',
      'suggest_corrected_captions', 'post_process', 'all_suite'
    ];

    for (const f of fields) {
      const val = $(f).value.trim();
      if (val) body[f] = val;
    }

    body.combine_infographic_audio = $('combine_infographic_audio').checked;
    body.no_youtube_summary = $('no_youtube_summary').checked;
    body.verbose = $('verbose').checked;

    // Reset UI
    const logArea = $('log-area');
    logArea.textContent = '';
    logArea.style.display = 'block';
    $('status-bar').style.display = 'flex';
    $('status-dot').className = 'status-dot';
    $('status-text').textContent = 'Processing...';
    $('artifacts-card').style.display = 'none';
    $('process-btn').disabled = true;

    if (eventSource) { eventSource.close(); eventSource = null; }

    fetch('/api/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    .then(r => {
      if (!r.ok) {
        return r.text().then(text => {
          throw new Error('Server error (' + r.status + '): ' + text);
        });
      }
      return r.json();
    })
    .then(data => {
      currentJobId = data.job_id;
      connectSSE(data.job_id);
    })
    .catch(err => {
      logArea.textContent += 'Error starting job: ' + err.message + '\n';
      $('status-dot').className = 'status-dot error';
      $('status-text').textContent = 'Failed to start';
      $('process-btn').disabled = false;
    });
  }

  function connectSSE(jobId) {
    const logArea = $('log-area');
    eventSource = new EventSource('/api/jobs/' + jobId + '/stream');

    eventSource.onmessage = function(e) {
      logArea.textContent += e.data + '\n';
      logArea.scrollTop = logArea.scrollHeight;
    };

    eventSource.addEventListener('done', function() {
      eventSource.close();
      $('status-dot').className = 'status-dot done';
      $('status-text').textContent = 'Completed';
      $('process-btn').disabled = false;
      loadArtifacts(jobId);
    });

    eventSource.addEventListener('error', function(e) {
      if (e.data) {
        logArea.textContent += '\nError: ' + e.data + '\n';
      }
      eventSource.close();
      $('status-dot').className = 'status-dot error';
      $('status-text').textContent = 'Error';
      $('process-btn').disabled = false;
      loadArtifacts(jobId);
    });

    eventSource.onerror = function() {
      // SSE connection error — check job status
      eventSource.close();
      fetch('/api/jobs/' + jobId)
        .then(r => r.json())
        .then(job => {
          if (job.status === 'completed') {
            $('status-dot').className = 'status-dot done';
            $('status-text').textContent = 'Completed';
            loadArtifacts(jobId);
          } else if (job.status === 'error') {
            $('status-dot').className = 'status-dot error';
            $('status-text').textContent = 'Error';
            if (job.error) logArea.textContent += '\nError: ' + job.error + '\n';
            loadArtifacts(jobId);
          }
          $('process-btn').disabled = false;
        });
    };
  }

  function loadArtifacts(jobId) {
    fetch('/api/jobs/' + jobId)
      .then(r => r.json())
      .then(job => {
        if (!job.artifacts || job.artifacts.length === 0) return;

        const list = $('artifacts-list');
        list.innerHTML = '';
        $('artifacts-card').style.display = 'block';

        for (const a of job.artifacts) {
          const item = document.createElement('div');
          item.className = 'artifact-item';
          // Handle both / (WSL/macOS/Linux) and \ (Windows/PowerShell) path separators
          const lastSep = Math.max(a.path.lastIndexOf('/'), a.path.lastIndexOf('\\'));
          const dirPath = lastSep > 0 ? a.path.substring(0, lastSep) : a.directory;

          const info = document.createElement('div');
          info.className = 'artifact-info';
          const dirSpan = document.createElement('span');
          dirSpan.className = 'dir';
          dirSpan.textContent = dirPath;
          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = a.name;
          nameSpan.title = a.name;
          info.appendChild(dirSpan);
          info.appendChild(nameSpan);

          const link = document.createElement('a');
          link.href = '/api/artifacts/' + encodeURI(a.path);
          link.target = '_blank';
          link.textContent = 'Download';

          item.appendChild(info);
          item.appendChild(link);
          list.appendChild(item);
        }
      });
  }
</script>
</body>
</html>

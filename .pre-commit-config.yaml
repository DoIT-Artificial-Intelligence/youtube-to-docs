repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: uv tool run ruff format
        language: system
        types: [python]
        args: ["."]

      - id: ruff-check
        name: Ruff Lint
        entry: uv tool run ruff check
        language: system
        types: [python]
        args: ["--fix", "."]

      - id: ty-check
        name: Type Check (Ty)
        entry: uv run --with ty --all-extras --group test ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: Run Tests
        entry: uv run --all-extras --group test pytest -n auto
        language: system
        types: [python]
        pass_filenames: false

      - id: html-validate
        name: HTML Validate (a11y lint)
        entry: bash -c 'npx html-validate@10.11.1 youtube_to_docs/static/index.html'
        language: system
        types: [html]
        pass_filenames: false

      - id: axe-scan
        name: axe-core WCAG 2.1 AA Scan
        entry: bash -c 'npx browser-driver-manager install chrome;
          python3 -m http.server 8080 --directory youtube_to_docs/static &
          SERVER_PID=$!;
          for i in $(seq 1 10); do curl -sf http://localhost:8080/index.html > /dev/null && break; sleep 1; done;
          npx @axe-core/cli@4.11.1 --exit --tags wcag2a,wcag2aa http://localhost:8080/index.html;
          STATUS=$?; kill $SERVER_PID; exit $STATUS'
        language: system
        types: [html]
        pass_filenames: false